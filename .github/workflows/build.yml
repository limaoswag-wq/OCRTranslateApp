name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup
      run: |
        curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.35.0/xcodegen.zip -o xcodegen.zip
        unzip -o xcodegen.zip
        sudo cp xcodegen/bin/xcodegen /usr/local/bin/xcodegen
        sudo chmod +x /usr/local/bin/xcodegen
        xcodegen generate
        xcodebuild -project OCRTranslate.xcodeproj -list

    - name: Build Archive
      run: |
        set -o pipefail
        xcodebuild clean archive \
          -project OCRTranslate.xcodeproj \
          -scheme OCRTranslate \
          -configuration Release \
          -archivePath build/OCRTranslate.xcarchive \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          ENABLE_BITCODE=NO \
          2>&1 | tail -100

    - name: Package IPA
      if: success()
      run: |
        cd build/OCRTranslate.xcarchive/Products
        mkdir -p Payload
        mv Applications/OCRTranslate.app Payload/
        zip -r ../../../OCRTranslate.ipa Payload
        ls -la ../../../OCRTranslate.ipa

    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OCRTranslate-IPA
        path: OCRTranslate.ipa
        retention-days: 90
