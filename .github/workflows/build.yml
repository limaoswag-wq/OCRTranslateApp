name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Install xcodegen
      run: |
        curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip -o xcodegen.zip
        unzip -o xcodegen.zip
        sudo cp xcodegen/bin/xcodegen /usr/local/bin/xcodegen
        sudo chmod +x /usr/local/bin/xcodegen
        xcodegen version

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build Archive
      run: |
        set -o pipefail
        xcodebuild clean archive \
          -project OCRTranslate.xcodeproj \
          -scheme OCRTranslate \
          -configuration Release \
          -archivePath build/OCRTranslate.xcarchive \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM=""

    - name: Package IPA
      if: success()
      run: |
        set -euo pipefail
        APP_PATH="build/OCRTranslate.xcarchive/Products/Applications/OCRTranslate.app"
        WORK_DIR="build/ipa_staging"
        rm -rf "$WORK_DIR"
        mkdir -p "$WORK_DIR/Payload"
        cp -R "$APP_PATH" "$WORK_DIR/Payload/"
        test -d "$WORK_DIR/Payload/OCRTranslate.app/PlugIns/ScreenTranslator.appex"
        cd "$WORK_DIR"
        zip -r "$GITHUB_WORKSPACE/OCRTranslate.ipa" Payload/
        echo "=== IPA verification ==="
        unzip -l "$GITHUB_WORKSPACE/OCRTranslate.ipa" | grep -E "PlugIns|ScreenTranslator"

    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OCRTranslate-IPA
        path: OCRTranslate.ipa
        retention-days: 90