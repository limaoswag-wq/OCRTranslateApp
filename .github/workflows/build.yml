name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
        xcodebuild -version

    - name: List project structure
      run: |
        find . -name "*.swift" -o -name "*.plist" -o -name "*.pbxproj" -o -name "*.xcscheme" | sort
        echo "---"
        file OCRTranslate.xcodeproj/project.pbxproj
        head -5 OCRTranslate.xcodeproj/project.pbxproj

    - name: Show schemes
      run: xcodebuild -project OCRTranslate.xcodeproj -list

    - name: Build Archive
      run: |
        xcodebuild clean archive \
          -project OCRTranslate.xcodeproj \
          -scheme OCRTranslate \
          -configuration Release \
          -archivePath build/OCRTranslate.xcarchive \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          ENABLE_BITCODE=NO

    - name: Package IPA
      if: success()
      run: |
        cd build/OCRTranslate.xcarchive/Products
        mkdir -p Payload
        mv Applications/OCRTranslate.app Payload/
        zip -r ../../../OCRTranslate.ipa Payload
        ls -la ../../../OCRTranslate.ipa

    - name: Upload IPA Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OCRTranslate-IPA
        path: OCRTranslate.ipa
        retention-days: 90
