workflows:
  ocr-translate-ipa:
    name: Build OCR Translate IPA
    max_build_duration: 30
    environment:
      xcode: 16.0
    scripts:
      - name: Install xcodegen
        script: |
          curl -L --connect-timeout 30 --max-time 120 https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip -o xcodegen.zip
          unzip -o xcodegen.zip
          sudo cp xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          sudo chmod +x /usr/local/bin/xcodegen
          xcodegen version

      - name: Generate Xcode project
        script: |
          xcodegen generate 2>&1
          echo "Exit code: $?"

      - name: Build archive
        script: |
          set -o pipefail
          xcodebuild clean archive \
            -project OCRTranslate.xcodeproj \
            -scheme OCRTranslate \
            -configuration Release \
            -archivePath build/OCRTranslate.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Debug and Package IPA
        script: |
          set -euo pipefail
          cd build/OCRTranslate.xcarchive/Products
          rm -rf Payload
          mkdir -p Payload
          cp -R Applications/OCRTranslate.app Payload/
          
          # Verify Extension exists
          echo "=== Verify Extension ==="
          ls -la Payload/OCRTranslate.app/PlugIns/
          ls -la Payload/OCRTranslate.app/PlugIns/ScreenTranslator.appex/
          
          # Verify Extension Info.plist
          echo "=== Extension Info.plist ==="
          plutil -p Payload/OCRTranslate.app/PlugIns/ScreenTranslator.appex/Info.plist
          
          # Create IPA using standard zip (not ditto)
          cd "$CM_BUILD_DIR"
          zip -r OCRTranslate.ipa Payload
          
          # Verify IPA contents
          echo "=== IPA contents ==="
          unzip -l OCRTranslate.ipa | grep -E "PlugIns|ScreenTranslator"

    artifacts:
      - OCRTranslate.ipa
