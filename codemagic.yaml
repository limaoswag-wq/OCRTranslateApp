workflows:
  ocr-translate-ipa:
    name: Build OCR Translate IPA
    max_build_duration: 30
    environment:
      xcode: 16.0
    scripts:
      - name: Install xcodegen
        script: |
          curl -L --connect-timeout 30 --max-time 120 https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip -o xcodegen.zip
          unzip -o xcodegen.zip
          sudo cp xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          sudo chmod +x /usr/local/bin/xcodegen
          xcodegen version

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build archive
        script: |
          set -o pipefail
          xcodebuild clean archive \
            -project OCRTranslate.xcodeproj \
            -scheme OCRTranslate \
            -configuration Release \
            -archivePath build/OCRTranslate.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: ldid fakesign (TrollStore requirement)
        script: |
          brew install ldid
          
          APP_PATH="build/OCRTranslate.xcarchive/Products/Applications/OCRTranslate.app"
          
          # Fakesign main app binary with its entitlements
          ldid -S"OCRTranslate/OCRTranslate.entitlements" "$APP_PATH/OCRTranslate"
          echo "Main app signed."
          
          # Fakesign extension binary with its own entitlements (critical step!)
          ldid -S"ScreenTranslator/ScreenTranslator.entitlements" "$APP_PATH/PlugIns/ScreenTranslator.appex/ScreenTranslator"
          echo "Extension signed."
          
          # Verify signatures exist
          ldid -e "$APP_PATH/OCRTranslate" | head -20
          echo "---"
          ldid -e "$APP_PATH/PlugIns/ScreenTranslator.appex/ScreenTranslator" | head -20

      - name: Debug archive contents
        script: |
          APP_PATH="build/OCRTranslate.xcarchive/Products/Applications/OCRTranslate.app"
          echo "=== .app ==="
          ls -la "$APP_PATH/"
          echo ""
          echo "=== PlugIns ==="
          ls -laR "$APP_PATH/PlugIns/"
          echo ""
          echo "=== Main executable ==="
          file "$APP_PATH/OCRTranslate"
          echo ""
          echo "=== Extension executable ==="
          file "$APP_PATH/PlugIns/ScreenTranslator.appex/ScreenTranslator"

      - name: Package IPA
        script: |
          set -euo pipefail
          APP_PATH="build/OCRTranslate.xcarchive/Products/Applications/OCRTranslate.app"
          WORK_DIR="/tmp/ipa_build"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR/Payload"
          cp -R "$APP_PATH" "$WORK_DIR/Payload/"
          test -d "$WORK_DIR/Payload/OCRTranslate.app/PlugIns/ScreenTranslator.appex"
          xattr -cr "$WORK_DIR/Payload" 2>/dev/null || true
          cd "$WORK_DIR"
          zip -ry "$CM_BUILD_DIR/OCRTranslate.ipa" Payload/
          echo "=== IPA Extension entries ==="
          unzip -l "$CM_BUILD_DIR/OCRTranslate.ipa" | grep -E "PlugIns|ScreenTranslator"

    artifacts:
      - OCRTranslate.ipa
