workflows:
  ocr-translate-ipa:
    name: Build OCR Translate IPA
    max_build_duration: 30
    environment:
      xcode: 16.0
    scripts:
      - name: Install xcodegen
        script: |
          curl -L --connect-timeout 30 --max-time 120 https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip -o xcodegen.zip
          unzip -o xcodegen.zip
          sudo cp xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          sudo chmod +x /usr/local/bin/xcodegen
          xcodegen version

      - name: Generate Xcode project
        script: |
          xcodegen generate 2>&1
          echo "Exit code: $?"

      - name: Build archive
        script: |
          set -o pipefail
          xcodebuild clean archive \
            -project OCRTranslate.xcodeproj \
            -scheme OCRTranslate \
            -configuration Release \
            -archivePath build/OCRTranslate.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        script: |
          set -euo pipefail
          cd build/OCRTranslate.xcarchive/Products
          rm -rf Payload
          mkdir -p Payload
          cp -R Applications/OCRTranslate.app Payload/
          test -d Payload/OCRTranslate.app/PlugIns/ScreenTranslator.appex
          ditto -c -k --sequesterRsrc --keepParent Payload "$CM_BUILD_DIR/OCRTranslate.ipa"

    artifacts:
      - build/OCRTranslate.xcarchive
      - OCRTranslate.ipa
