workflows:
  ocr-translate-ipa:
    name: Build OCR Translate IPA
    max_build_duration: 30
    environment:
      xcode: 16.0
    scripts:
      - name: Build archive
        script: |
          set -o pipefail
          xcodebuild clean archive \
            -project OCRTranslate.xcodeproj \
            -scheme OCRTranslate \
            -configuration Release \
            -archivePath build/OCRTranslate.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO

      - name: Package IPA
        script: |
          cd build/OCRTranslate.xcarchive/Products
          mkdir -p Payload
          mv Applications/OCRTranslate.app Payload/
          zip -r "$CM_BUILD_DIR/OCRTranslate.ipa" Payload

    artifacts:
      - build/OCRTranslate.xcarchive
      - OCRTranslate.ipa
